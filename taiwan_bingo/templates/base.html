<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}TaiwanBingo{% endblock %} - 賓果賓果分析系統</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
  <div class="container-fluid">
    <a class="navbar-brand fw-bold" href="/">
      <i class="bi bi-grid-3x3-gap-fill me-2"></i>TaiwanBingo
    </a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navMenu">
      <ul class="navbar-nav me-auto mb-2 mb-lg-0">
        <li class="nav-item">
          <a class="nav-link" href="/"><i class="bi bi-house me-1"></i>首頁</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="/history"><i class="bi bi-clock-history me-1"></i>歷史開獎</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="/analysis"><i class="bi bi-bar-chart me-1"></i>統計分析</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="/predictions"><i class="bi bi-cpu me-1"></i>ML 預測</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="/docs" target="_blank"><i class="bi bi-file-code me-1"></i>API 文件</a>
        </li>
      </ul>
      <span class="navbar-text text-light small">
        <i class="bi bi-circle-fill text-success me-1" style="font-size:.6rem"></i>賓果賓果每5分鐘開獎
      </span>
    </div>
  </div>
</nav>

<main class="container-fluid py-4">
  {% block content %}{% endblock %}
</main>

<footer class="footer mt-auto py-3 bg-light border-top">
  <div class="container text-center text-muted small">
    <p class="mb-0">
      TaiwanBingo 分析系統 &mdash; 本系統僅供學術研究，不構成投注建議。
      彩票具有隨機性，請理性參與。
    </p>
  </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
{% block scripts %}{% endblock %}
</body>
</html>
